<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <title>Registrasi - Sistem Informasi Desa</title>

    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/bootstrap-icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="auth-wrapper d-flex align-items-center justify-content-center p-4">
        <div class="auth-card">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="../assets/images/logo_minsel.png" alt="Logo Minahasa Selatan" width="70" class="mb-3">
                        <h3 class="fw-bold text-dark">Registrasi Admin Baru</h3>
                        <p class="text-muted small">Sistem Informasi Desa Terpadu — Desa Pondos</p>
                    </div>

                    <form action="#" method="post">
                        <div class="mb-3">
                            <label for="nama" class="form-label fw-medium">Nama Lengkap</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-fill"></i></span>
                                <input type="text" class="form-control border-start-0" id="nama" placeholder="Masukkan nama lengkap">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Alamat Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0" id="email" placeholder="admin@pondos.desa.id">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="jabatan" class="form-label fw-medium">Jabatan / Peran</label>
                            <select class="form-select" id="jabatan">
                                <option selected disabled>-- Pilih Jabatan --</option>
                                <option>Kepala Desa / Hukum Tua</option>
                                <option>Sekretaris Desa</option>
                                <option>Kaur Keuangan</option>
                                <option>Kaur Pemerintahan</option>
                                <option>Kasi Pelayanan</option>
                                <option>Operator Desa</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" placeholder="Buat password">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="konfirmasi-password" class="form-label fw-medium">Konfirmasi Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control border-start-0" id="konfirmasi-password" placeholder="Ulangi password">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-medium py-2 mb-3">
                            Daftar Akun
                        </button>

                        <div class="text-center">
                            <span class="text-muted small">Sudah punya akun?</span>
                            <a href="login.html" class="text-success fw-medium text-decoration-none small">Masuk di sini</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="../index.html" class="text-white text-decoration-none opacity-75 small">← Kembali ke Beranda</a>
            </div>
        </div>
    </div>

  </body>
</html>
