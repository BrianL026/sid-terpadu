<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <title>Login Admin - Sistem Informasi Desa</title>

    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/bootstrap-icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <div class="auth-wrapper d-flex align-items-center justify-content-center p-4">
        <div class="auth-card">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="../assets/images/logo_minsel.png" alt="Logo Minahasa Selatan" width="70" class="mb-3">
                        <h3 class="fw-bold text-dark">Login Administrator</h3>
                        <p class="text-muted small">Sistem Informasi Desa Terpadu — Desa Pondos</p>
                    </div>

                    <form action="#" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Alamat Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0" id="email" placeholder="admin@pondos.desa.id">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control border-start-0" id="password" placeholder="Masukkan password">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label small" for="remember">Ingat Saya</label>
                            </div>
                            <a href="#" class="small text-success text-decoration-none">Lupa Password?</a>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-medium py-2 mb-3">
                            Masuk
                        </button>

                        <div class="text-center">
                            <span class="text-muted small">Belum punya akun?</span>
                            <a href="register.html" class="text-success fw-medium text-decoration-none small">Daftar di sini</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="../index.html" class="text-white text-decoration-none opacity-75 small">← Kembali ke Beranda</a>
            </div>
        </div>
    </div>

  </body>
</html>
